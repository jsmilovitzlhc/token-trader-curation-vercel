{% extends "base.html" %}

{% block title %}Add Link — Token Trader Curation{% endblock %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Add New Link</h2>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" id="add-form">
        <div class="form-group">
            <label for="url">URL *</label>
            <div style="display: flex; gap: 12px;">
                <input type="url" id="url" name="url" placeholder="https://..." required style="flex: 1;">
                <button type="button" id="fetch-btn" class="btn btn-secondary">Fetch Metadata</button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Article title">
            </div>
            <div class="form-group">
                <label for="source">Source</label>
                <input type="text" id="source" name="source" placeholder="Publication name">
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Brief summary..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" placeholder="Author name">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="issue">Issue</label>
                <input type="text" id="issue" name="issue" placeholder="e.g., 2026-W23">
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="0">Normal</option>
                    <option value="1">High</option>
                    <option value="2">Featured</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="tags">Tags (comma-separated)</label>
            <input type="text" id="tags" name="tags" placeholder="compute, pricing, frontier">
        </div>

        <div class="form-group">
            <label for="notes">Your Notes / Commentary</label>
            <textarea id="notes" name="notes" placeholder="Your take on this article..."></textarea>
        </div>

        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Save Link</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('fetch-btn').addEventListener('click', async function() {
    const url = document.getElementById('url').value;
    if (!url) {
        alert('Enter a URL first');
        return;
    }

    this.disabled = true;
    this.textContent = 'Fetching...';

    try {
        const response = await fetch('/fetch-metadata', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });
        const data = await response.json();

        if (data.title) document.getElementById('title').value = data.title;
        if (data.description) document.getElementById('description').value = data.description;
        if (data.source) document.getElementById('source').value = data.source;
        if (data.author) document.getElementById('author').value = data.author;
    } catch (e) {
        alert('Failed to fetch metadata');
    }

    this.disabled = false;
    this.textContent = 'Fetch Metadata';
});
</script>
{% endblock %}
