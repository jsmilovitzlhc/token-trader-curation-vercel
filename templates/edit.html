{% extends "base.html" %}

{% block title %}Edit Link — Token Trader Curation{% endblock %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Edit Link</h2>

    <form method="POST">
        <div class="form-group">
            <label>URL</label>
            <input type="url" value="{{ link.url }}" disabled style="background: #f5f5f5;">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ link.title or '' }}">
            </div>
            <div class="form-group">
                <label for="source">Source</label>
                <input type="text" id="source" name="source" value="{{ link.source or '' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{ link.description or '' }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" value="{{ link.author or '' }}">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}" {% if link.category == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status">
                    {% for status in statuses %}
                    <option value="{{ status }}" {% if link.status == status %}selected{% endif %}>{{ status|title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="issue">Issue</label>
                <input type="text" id="issue" name="issue" value="{{ link.issue or '' }}" placeholder="e.g., 2026-W23">
            </div>
            <div class="form-group">
                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="0" {% if link.priority == 0 %}selected{% endif %}>Normal</option>
                    <option value="1" {% if link.priority == 1 %}selected{% endif %}>High</option>
                    <option value="2" {% if link.priority == 2 %}selected{% endif %}>Featured</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="tags">Tags (comma-separated)</label>
            <input type="text" id="tags" name="tags" value="{{ link.tags or '' }}">
        </div>

        <div class="form-group">
            <label for="notes">Your Notes / Commentary</label>
            <textarea id="notes" name="notes">{{ link.notes or '' }}</textarea>
        </div>

        <div style="display: flex; gap: 12px; justify-content: space-between;">
            <div style="display: flex; gap: 12px;">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
            </div>
            <form method="POST" action="{{ url_for('delete_link', link_id=link.id) }}" style="display: inline;">
                <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this link?')">Delete</button>
            </form>
        </div>
    </form>
</div>
{% endblock %}
